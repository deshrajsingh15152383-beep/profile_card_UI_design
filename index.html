<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card UI Design </title>

    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="profile.jpg" alt="" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">DESHRAJ SINGH</span>
            <span class="job">WEB DEVELOPER</span>
        </div>

        <div class="media-buttoms">
            <a href="#" style="background-color: #4267b2;" class="link">
                <i class='bx bxl-facebook' ></i>
            </a>
            <a href="#" style="background-color: rgb(19, 89, 19);" class="link">
                <i class='bx bxl-whatsapp' ></i>
            </a>
            <a href="#" style="background-color: #1da1f2;" class="link">
                <i class='bx bxl-linkedin-square' ></i>
            </a>
            <a href="#" style="background-color: rgb(23, 22, 22);" class="link">
                <i class='bx bxl-github' ></i>
            </a>
        </div>

        <div class="buttons">
            
            <button class="button">AI ENGINEER</button>
            <button class="button">MESSAGE</button>
        </div>

        <div class="analytics">
            <div class="data"></div>
        </div>
    </div>
    
</body>
</html>
